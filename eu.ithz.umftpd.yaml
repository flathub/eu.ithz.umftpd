app-id: eu.ithz.umftpd
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: umftpd
finish-args:
- --device=dri
- --filesystem=xdg-public-share
- --share=ipc
- --share=network
- --socket=fallback-x11
- --socket=wayland
modules:
- name: umftpd
  buildsystem: simple
  build-commands:
  - pip install --prefix=/app --no-index --find-links="file://${PWD}" --compile .
  - cp -R flatpak/app/* /app/
